# =============================================================================
# 应用程序配置文件模板
# =============================================================================
# 使用说明：
# 1. 复制此文件为 config.yaml
# 2. 根据实际环境修改各项配置
# 3. 确保必填字段已正确配置
# =============================================================================

# -----------------------------------------------------------------------------
# 通用配置
# -----------------------------------------------------------------------------
common:
  # 服务监听地址和端口
  # 格式: "host:port" 或 ":port"
  # 示例: "0.0.0.0:8080" 或 ":8080"
  listen: ":8080"

# -----------------------------------------------------------------------------
# 数据库配置
# -----------------------------------------------------------------------------
database:
  # 关系型数据库配置
  relational:
    # 数据库驱动类型
    # 可选值: "mysql", "postgres"
    driver: "postgres"

    # MySQL 配置 (当 driver 为 "mysql" 时使用)
    mysql:
      host: "localhost"
      port: 3306
      user: "root"
      password: "your_password_here"
      # 数据库名称
      dbname: "app_db"
      # 额外的连接参数，格式: "param1=value1&param2=value2"
      # 示例: "charset=utf8mb4&parseTime=True&loc=Local"
      params: ""
      # 连接池配置
      pool:
        # 最大打开连接数
        max_open_conns: 25
        # 最大空闲连接数
        max_idle_conns: 5
        # 连接最大生命周期
        # 格式: 数字 + 时间单位 (s=秒, m=分钟, h=小时)
        conn_max_lifetime: "5m"
        # 空闲连接最大存活时间
        conn_max_idle_time: "5m"

    # PostgreSQL 配置 (当 driver 为 "postgres" 时使用)
    postgres:
      host: "localhost"
      port: 5432
      user: "postgres"
      password: "your_password_here"
      # 数据库名称
      dbname: "app_db"
      # SSL 模式
      # 可选值: "disable", "allow", "prefer", "require", "verify-ca", "verify-full"
      sslmode: "disable"
      # 连接池配置
      pool:
        # 最大打开连接数
        max_open_conns: 25
        # 最大空闲连接数
        max_idle_conns: 5
        # 连接最大生命周期
        # 格式: 数字 + 时间单位 (s=秒, m=分钟, h=小时)
        conn_max_lifetime: "5m"
        # 空闲连接最大存活时间
        conn_max_idle_time: "5m"

  # Redis 配置
  redis:
    # Redis 服务器地址
    # 格式: "host:port"
    # 示例: "localhost:6379" 或 "redis.example.com:6379"
    addr: "localhost:6379"
    # Redis 用户名 (可选，留空表示无需认证)
    username: ""
    # Redis 密码 (可选，留空表示无需认证)
    password: ""
    # Redis 数据库编号 (0-15)
    db: 0
    # 连接池最大连接数
    pool_size: 10
    # 最小空闲连接数
    min_idle_conns: 5
    # 连接建立超时时间
    # 格式: 数字 + 时间单位 (s=秒, ms=毫秒)
    dial_timeout: "5s"
    # 读取操作超时时间
    read_timeout: "3s"
    # 写入操作超时时间
    write_timeout: "3s"

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logger:
  # 日志输出方式
  # 可选值: "console" (输出到标准输出), "file" (输出到文件)
  output: "console"
  # 日志文件目录 (当 output 为 "file" 时使用)
  # 示例: "/var/log/app" 或 "./logs"
  filepath: "./logs"
  # 日志文件名 (当 output 为 "file" 时使用)
  filename: "app.log"
  # 日志级别
  # 可选值: "debug", "info", "warn", "error"
  # 开发环境建议使用 "debug"，生产环境建议使用 "info"
  level: "info"
  # 最多保留的日志文件备份数量
  # 设置为 0 表示不限制
  max_backups: 7
  # 日志文件保留天数
  # 设置为 0 表示不自动删除
  max_age: 30
  # 是否启用 OpenTelemetry 日志导出
  # 启用后日志将同时发送到 OTEL 收集器
  otel_enable: false
  # OpenTelemetry 日志收集器端点
  # 格式: "host:port"
  # 示例: "otel-collector:4317"
  # 仅当 otel_enable 为 true 时生效
  otel_endpoint: ""
  # OpenTelemetry 认证 Token
  # 通常为 Bearer Token 格式
  otel_auth: ""
  # OpenTelemetry 服务名称 (用于日志标识)
  otel_service_name: "app"

# -----------------------------------------------------------------------------
# 追踪配置 (OpenTelemetry)
# -----------------------------------------------------------------------------
trace:
  # 是否启用 OpenTelemetry 追踪
  otel_enable: false
  # OTLP 导出器端点
  # 格式: "host:port"
  # 示例: "jaeger-collector:4317" 或 "tempo:4317"
  otel_endpoint: ""
  # 认证 Token
  # 格式: 通常为 "Bearer <token>" 或直接为 token 字符串
  otel_auth: ""
  # 服务名称 (用于追踪标识)
  # 应与 logger.otel_service_name 保持一致
  otel_service_name: "app"
  # 服务版本
  # 推荐使用语义化版本: "1.0.0"
  otel_service_version: "1.0.0"
  # 部署环境
  # 推荐值: "development", "staging", "production"
  otel_environment: "development"
  # 组织名称 (某些追踪后端需要，如 Lightstep)
  # 留空表示使用默认组织
  otel_organization: ""
  # 数据流名称 (某些追踪后端需要)
  # 留空表示使用默认数据流
  otel_stream_name: ""
  # 采样器类型
  # 可选值:
  #   - "always_on": 采样所有请求 (默认)
  #   - "always_off": 不采样任何请求
  #   - "trace_id_ratio": 按比例采样
  otel_sampler_type: "always_on"
  # 采样比例 (仅当 sampler_type 为 "trace_id_ratio" 时生效)
  # 范围: 0.0 - 1.0
  # 例如: 0.1 表示采样 10% 的请求
  otel_sampler_ratio: 1.0
  # 自定义 HTTP Headers
  # 格式: Key-Value 对，用于传递给 OTLP 收集器
  # otel_headers:
  #   custom-header: "custom-value"

# -----------------------------------------------------------------------------
# Metrics 配置 (OpenTelemetry)
# -----------------------------------------------------------------------------
metrics:
  # 是否启用 OpenTelemetry metrics 导出
  otel_enable: false
  # OTLP metrics 收集器端点
  # 格式: "host:port"
  # 示例: "otel-collector:4317"
  otel_endpoint: ""
  # 认证 Token
  # 格式: 通常为 "Bearer <token>" 或直接为 token 字符串
  otel_auth: ""
  # 服务名称 (用于 metrics 标识)
  # 应与 logger/trace.otel_service_name 保持一致
  otel_service_name: "demo-go-framework"
  # 服务版本
  # 推荐使用语义化版本: "1.0.0"
  otel_service_version: "1.0.0"
  # 部署环境
  # 推荐值: "development", "staging", "production"
  otel_environment: "development"
  # 组织名称 (某些 metrics 后端需要)
  # 留空表示使用默认组织
  otel_organization: ""
  # 数据流名称 (某些 metrics 后端需要)
  # 留空表示使用默认数据流
  otel_stream_name: ""
  # metrics 导出周期
  # 格式: 数字 + 时间单位 (s=秒, m=分钟)
  export_interval: "10s"
  # 单次导出超时时间
  export_timeout: "5s"
  # 自定义 HTTP Headers
  # 格式: Key-Value 对，用于传递给 OTLP 收集器
  # otel_headers:
  #   custom-header: "custom-value"

# -----------------------------------------------------------------------------
# JWT 配置
# -----------------------------------------------------------------------------
jwt:
  # 本地 Token 签名密钥
  # 重要: 生产环境请使用足够长度的随机字符串 (建议 32 字节以上)
  # 可以使用命令生成: openssl rand -base64 32
  token_secret: "your-secret-key-change-in-production"
  # OAuth/OIDC JWK Set URL
  # 用于验证外部 OAuth provider 颁发的 Token
  # 示例: "https://auth.example.com/.well-known/jwks.json"
  # 留空表示不启用 OAuth Token 验证
  oauth_jwk_url: ""

# -----------------------------------------------------------------------------
# RBAC/ABAC 权限配置
# -----------------------------------------------------------------------------
rbac:
  # 是否启用 RBAC (基于角色的访问控制)
  # 可选值: true, false
  enabled: true

  # RBAC 模型配置文件路径
  # 包含权限定义、角色继承等规则
  model_path: "pkg/rbac/model.conf"

  # RBAC 策略文件路径
  # 包含具体的权限分配规则
  policy_path: "pkg/rbac/policy.csv"

  # 默认角色 (当用户未分配角色时使用)
  default_role: "guest"

# ABAC 配置 (基于属性的访问控制)
abac:
  # 是否启用 ABAC
  enabled: true

  # ABAC 模型配置文件路径
  # 包含基于属性的动态权限规则
  model_path: "pkg/rbac/abac_model.conf"
