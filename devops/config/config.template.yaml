# =============================================================================
# Demo Go Framework 配置文件模板
# =============================================================================
# 用途：复制此文件为 config.yaml 并根据实际情况修改
# 路径：devops/config/config.yaml
# =============================================================================

app:
  env: development
  host: 0.0.0.0
  port: 8080
  name: demo-go-framework
  log_level: info

# 数据库配置
database:
  relational:
    # 可选值: mysql, postgres
    driver: postgres
    mysql:
      host: localhost
      port: 3306
      user: demo_user
      password: demo_password
      dbname: demo_db
      params: charset=utf8mb4&parseTime=True&loc=Local
      pool:
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: 5m
        conn_max_idle_time: 5m
    postgres:
      host: localhost
      port: 5432
      user: demo_user
      password: demo_password
      dbname: demo_db
      sslmode: disable
      pool:
        max_open_conns: 25
        max_idle_conns: 5
        conn_max_lifetime: 5m
        conn_max_idle_time: 5m

  redis:
    addr: localhost:6379
    username: ""
    password: ""
    db: 0
    pool_size: 10
    min_idle_conns: 5
    dial_timeout: 5s
    read_timeout: 3s
    write_timeout: 3s
    max_retries: 3

  health_check_timeout: 5s

# 日志配置
logger:
  level: info
  format: json
  output: stdout

# 追踪配置 (OpenTelemetry)
trace:
  enabled: true
  service_name: demo-go-framework
  exporter: otlp
  endpoint: localhost:4317
  protocol: grpc
  sample_rate: 1.0
  # 可选: always_on, always_off, trace_id_ratio
  sampler: always_on

# Metrics 配置 (OpenTelemetry)
metrics:
  enabled: true
  service_name: demo-go-framework
  exporter: otlp
  endpoint: localhost:4317
  protocol: grpc
  # Prometheus 兼容端点（可选）
  prometheus:
    enabled: false
    path: /metrics

# 健康检查端点
health:
  enabled: true
  path: /api/health
