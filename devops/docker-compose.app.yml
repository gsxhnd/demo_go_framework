# =============================================================================
# Docker Compose 配置 - 应用服务
# =============================================================================
# 用途：单独启动 Go 应用服务
# 启动命令：docker-compose -f docker-compose.app.yml up -d
# 注意事项：需要先启动数据库和监控服务
# =============================================================================

services:
  demo-go-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-demo}-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      CONFIG_PATH: /app/config.yaml
      # 服务配置
      APP_ENV: ${APP_ENV:-development}
      # OpenTelemetry 配置
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-demo-go-framework}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      # Metrics 配置
      METRICS_ENABLED: "true"
      METRICS_PATH: /metrics
    volumes:
      - ./config/config.yaml:/app/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  app-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-demo}-network
