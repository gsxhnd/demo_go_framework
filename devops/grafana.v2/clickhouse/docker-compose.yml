# =============================================================================
# Docker Compose 配置 - ClickHouse
# =============================================================================
# 用途：单独启动 ClickHouse 列式数据库
# 启动命令：docker compose up -d
# =============================================================================

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.12-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-demo}-clickhouse
    restart: unless-stopped
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123" # HTTP 接口
      - "${CLICKHOUSE_TCP_PORT:-9000}:9000" # Native TCP 接口
    environment:
      CLICKHOUSE_DB: demo
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8123/ping ||
            exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  clickhouse-data:
    name: ${COMPOSE_PROJECT_NAME:-demo}-clickhouse-data
  clickhouse-logs:
    name: ${COMPOSE_PROJECT_NAME:-demo}-clickhouse-logs

networks:
  app-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-demo}-network
