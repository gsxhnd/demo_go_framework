# =============================================================================
# Docker Compose 配置 - OTel Collector (Grafana v2)
# =============================================================================
# 用途：接收 OTLP 数据并写入 ClickHouse
# 启动命令：docker compose up -d
# 依赖：需要先启动 clickhouse/docker-compose.yml
# =============================================================================

services:
  otel-collector-v2:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: ${COMPOSE_PROJECT_NAME:-demo}-otel-collector-v2
    restart: unless-stopped
    ports:
      - "${OTEL_V2_GRPC_PORT:-4317}:4317" # OTLP gRPC
      - "${OTEL_V2_HTTP_PORT:-4318}:4318" # OTLP HTTP
      - "${OTEL_V2_INTERNAL_METRICS_PORT:-8888}:8888" # Collector 自身 metrics
      - "${OTEL_V2_HEALTH_PORT:-13133}:13133" # Health check
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:13133/health
            || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-demo}-network
