# =============================================================================
# Loki 配置文件 - 适配 Loki 3.6.x (最小化配置)
# =============================================================================
# 用途：配置 Loki 日志存储
# 文档：https://grafana.com/docs/loki/latest/configuration/
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# 最小化配置 - 使用本地存储
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# 模式配置
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# 限制配置
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_label_names_per_series: 30
  max_entries_limit_per_query: 5000

# 分析配置
analytics:
  reporting_enabled: false
