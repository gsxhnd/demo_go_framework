# =============================================================================
# Docker Compose — Grafana 面板（v1 Prometheus/Tempo/Loki + v2 ClickHouse）
# =============================================================================
# 依赖：后端栈使用同名网络 demo-network（与 monitor.v1.grafana / monitor.v2.clickhouse 一致）
# 启动：在本目录执行 docker compose up -d
# =============================================================================

services:
  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: demo-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_DATA: /var/lib/grafana
      GF_PATHS_LOGS: /var/log/grafana
      GF_PATHS_PLUGINS: /var/lib/grafana/plugins
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - ./grafana/config.ini:/etc/grafana/grafana.ini:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-panel-data:/var/lib/grafana
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  grafana-panel-data:
    name: demo-grafana-panel-data

networks:
  app-network:
    driver: bridge
    name: demo-network
