# =============================================================================
# Grafana 数据源 — v1 / v2 / v3 后端（同一 Docker 网络 demo-network）
# =============================================================================
# 说明：各数据源依赖对应 Compose 栈已加入网络 demo-network（容器名可解析）。
# 未启动的后端在 Explore 中会失败，属正常。
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      prometheusType: Prometheus
      httpMethod: POST
      cacheLevel: "High"
      rangeVectorDuration: 60s
      httpMethodDetails:
        codeMetricsLimit: 5000
    version: 1

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        enabled: true
      serviceMap:
        datasourceUid: "prometheus"
      tempoQuery:
        type: influx
    version: 1

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - matcherRegex: '"trace_id":"([a-f0-9]+)"'
          name: TraceID
          datasourceUid: tempo
          url: "$${__value.raw}"
        - matcherRegex: '"span_id":"([a-f0-9]+)"'
          name: SpanID
          datasourceUid: tempo
          url: "$${__value.raw}"
        - matcherRegex: "trace_id=([a-f0-9]+)"
          name: TraceID
          datasourceUid: tempo
          url: "$${__value.raw}"
      enableLogDetails: true
      labelFieldsList:
        - service_name
        - deployment_environment
        - level
        - trace_id
        - span_id
        - method
        - route
    version: 1

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    url: http://clickhouse:8123
    isDefault: false
    editable: false
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      defaultDatabase: otel
      tlsSkipVerify: true
    version: 1

  # monitor.v3.influxdb — OTel -> InfluxDB 2（metrics / traces / logs）
  - name: InfluxDB (OTel v3)
    type: influxdb
    uid: influxdb_otel_v3
    access: proxy
    url: http://influxdb:8086
    isDefault: false
    editable: false
    jsonData:
      version: Flux
      organization: demo
      defaultBucket: otel
      httpMode: POST
    secureJsonData:
      token: demo_influx_admin_token_for_local_dev_only_12345
    version: 1
