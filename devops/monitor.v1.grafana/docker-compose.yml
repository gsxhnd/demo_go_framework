# =============================================================================
# Docker Compose 配置 - monitor.v1.grafana（LGTM 后端，不含 Grafana UI）
# =============================================================================
# 用途：Prometheus、Tempo、Loki、OTel Collector
# Grafana 面板请单独启动：devops/monitor.grafana.panel/docker-compose.yml
# 启动命令：docker compose up -d
# =============================================================================

services:
  tempo:
    image: grafana/tempo:2.10.3
    container_name: demo-tempo
    restart: unless-stopped
    ports:
      - "3200:3200" # Tempo API
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo/config.yaml:/etc/tempo.yaml:ro
    networks:
      - app-network

  loki:
    image: grafana/loki:3.6.10
    container_name: demo-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./loki/config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.11.1
    container_name: demo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.max-block-duration=2h"
    volumes:
      - ./prometheus/config.yaml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - app-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: demo-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "9464:9464" # Prometheus scrape
      - "8888:8888" # Collector metrics
      - "13133:13133" # Health check
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - app-network
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  tempo-data:
    name: demo-tempo-data
  loki-data:
    name: demo-loki-data
  prometheus-data:
    name: demo-prometheus-data

networks:
  app-network:
    driver: bridge
    name: demo-network
