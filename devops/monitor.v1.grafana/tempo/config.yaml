# =============================================================================
# Tempo 配置文件 - 适配 Tempo 2.10.x (最小化配置)
# =============================================================================
# 用途：配置 Tempo 追踪存储
# 文档：https://grafana.com/docs/tempo/latest/configuration/
# =============================================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  complete_block_timeout: 5m
  flush_check_period: 10s
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# 全局限制
overrides:
  defaults:
    global:
      max_bytes_per_trace: 5000000
