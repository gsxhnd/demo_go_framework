# =============================================================================
# OpenTelemetry Collector — monitor.v3.influxdb
# =============================================================================
# 架构：Go App -> OTel Collector -> InfluxDB 2（measurements: spans / logs / metrics）
# Grafana：monitor.grafana.panel 预置 InfluxDB（Flux）数据源
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 1s
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: service.name
        action: insert
        from_attribute: service.name

exporters:
  influxdb:
    endpoint: http://influxdb:8086
    org: demo
    bucket: otel
    token: demo_influx_admin_token_for_local_dev_only_12345
    timeout: 10s
    metrics_schema: telegraf-prometheus-v1
    retry_on_failure:
      enabled: true
      initial_interval: 2s
      max_interval: 30s
      max_elapsed_time: 120s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 500

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [influxdb, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [influxdb, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [influxdb, debug]
