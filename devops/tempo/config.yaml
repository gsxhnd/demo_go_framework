# =============================================================================
# Tempo 配置文件
# =============================================================================
# 用途：配置 Tempo 追踪存储
# 文档：https://grafana.com/docs/tempo/latest/configuration/
# =============================================================================

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m
  complete_block_timeout: 5m
  flush_check_period: 10s
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 24h
    max-objects-per-block: 10000000

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

overrides:
  defaults:
    max_bytes_per_trace: 5000000
    max_duration: 30m
    max_spans_per_trace: 10000

metrics_generator:
  processor:
    service_graphs:
      enabled: true
    span_metrics:
      enabled: true
      histogram_bucket boundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]
