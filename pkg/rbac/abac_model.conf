# =============================================================================
# Casbin ABAC 模型配置
# =============================================================================
# 支持基于用户属性、资源属性和环境条件进行动态权限判断
# =============================================================================

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# 基础匹配器 - 支持属性表达式
m = eval(p.sub) && r.obj == p.obj && r.act == p.act

# 可扩展的匹配规则:
# - 用户角色匹配: r.sub.Role == p.sub.Role
# - 时间范围: currentTime >= p.sub.StartTime && currentTime <= p.sub.EndTime
# - IP 白名单: regexMatch(r.sub.IP, p.sub.AllowedIPs)
# - 资源所有者: r.sub.ID == p.obj.OwnerID
