# =============================================================================
# Casbin RBAC 模型配置
# =============================================================================
# 请求定义: sub, obj, act
# - sub: 访问主体 (用户、角色)
# - obj: 访问对象 (资源、路径)
# - act: 访问动作 (read, write, delete, etc.)
# =============================================================================

[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub) && r.obj == p.obj && r.act == p.act
